<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" href="webApp.css">
</head>
<body>
    <form class="new-user-section" id="new_user" method="POST">
		
		<label for="new_username">ENTER USERNAME</label>
		<input type="text" id="new_username" name="new_username" autocomplete="off" required>
		<label for="new_user_id">ENTER USER ID</label>
    	<input type="text" id="new_user_id" name="new_user_id" autocomplete="off" required>

		<input type="submit" value="Create Account">
	</form>

	<div class="popup" id="popup">
    <p id="popup_text"></p>
    <button id="close_popup">Close</button>
	</div>

    <script>

		const popup = document.getElementById('popup');
		const popup_text = document.getElementById('popup_text')
		const close_btn = document.getElementById('close_popup');

        document.getElementById('new_user').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('new_username').value;
		    const user_id = document.getElementById('new_user_id').value;

		    const data = { username: username, user_id: user_id };

		    fetch('/new_user', {
			    method: 'POST',
			    headers: { 'Content-Type': 'application/json' },
			    body: JSON.stringify(data)
		    })

		    .then(async response => {
			    if (response.redirected) {
				    window.location.href = response.url;
			    }  
				//if username/user_id already exist
			    else if(!response.ok){
				    let msg = 'Error';
    				try {
      					const json = await response.json();
      					if (json?.error) msg = json.error;
    				} 
					catch {
      					if (response.status === 409) msg = 'Username already exists';
      					else if (response.status === 400) msg = 'Error: 400';
      					else msg = `Server error: ${response.status}`;
    				}

					popup_text.textContent = msg;
    				popup.classList.add('show');
    				return;
			    }

		    })

        })

		close_btn.addEventListener('click', () => {
    	popup.classList.remove('show');
    	window.location.href = '/account_cr.html';
		});
    </script>
</body>
</html>
